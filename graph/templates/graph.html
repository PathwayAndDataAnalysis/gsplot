<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
  <div id="plot-container">
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
      }

      #plot-container {
        position: relative;
        padding-bottom: 60px;
        width: 100%;
        height: 100vh;
      }

      #download-button-wrapper {
        position: fixed;
        bottom: 10px;
        right: 49px;
        z-index: 100;
      }

      #download-button-wrapper button {
        padding: 8px 14px;
        font-size: 13px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        cursor: pointer;
      }

      #download-button-wrapper button:hover {
        background-color: #2980b9;
      }
    </style>
    <script>
      // This file handles the rendering of the interactive graph on the main page.
      // File is an HTML file because it is imported to the main page as an iframe so the graph renders correctly

      // All keys of the "data" key in local storage. Used to iterate through all keys of data
      // dataKeys: a list of all the things each point needs (coordinates, name, color, etc.)
      const dataKeys = [
        "X",
        "Y",
        "pValue",
        "qValue",
        "setName",
        "setSize",
        "molecules",
        "color",
        "pointNumber",
        "clusterID",
        "clusterLabel"
      ];

      let m = [];
      let relevantMembers = [];

      // Get refrences to graph div and loading spinner
      const myPlot = document.getElementById("plot-container");
      const spinnerOverlay =
        window.parent.document.getElementById("loading-spinner");

      // Start drawing
      // This runs when the page loads
      // If the data isn’t already saved, it fetches new UMAP data from backend.
      // Then calls graph() to actually draw the chart.

      // Draw initial graph
      async function main() {
        let settings = getLocalStorage("settings");

        // Check to see if there is already data saved, if not then fetch new data from backend
        const hasRawFile = localStorage.getItem("rawFile");
        const sigGenes = localStorage.getItem("sigGenes") || "";
        const insigGenes = localStorage.getItem("insigGenes") || "";
        const rankedGenes = localStorage.getItem("rankedGenes") || "";

        let singleList = false; // Default value if not found
        const storedSingleList = localStorage.getItem("single-list");
        if (storedSingleList !== null) {
          singleList = JSON.parse(storedSingleList); // Parse "true" to true, "false" to false
        }
        localStorage.setItem("reset", JSON.stringify(true));

        const hasGeneInput = sigGenes.trim() || insigGenes.trim();

        if (getLocalStorage("data") === null) {
          showSpinner();
          try {
            if (singleList == true) {
              await getGeneData(settings);
            } else {
              await getGeneInputData(settings);
            }

            // Clear selected + table after importing data
            localStorage.setItem("selected", JSON.stringify([]));
            window.parent.clearPoints();

          } catch (error) {
            hideSpinner();
            throw error;
          }
          hideSpinner();
        }

        // Draw graph after verifying that data is already present or recieved
        graph();

        // Apply some css to graph as putting these lines in a css file don't seem to apply since this is in an iframe
        let mainDisplay = document.getElementsByClassName("user-select-none");
        mainDisplay[0].style.boxShadow = "0 4px 8px rgba(0, 0, 0, 0.1)";
      }

      function getAxisLabels(settings) {
        const mode = settings?.mode || settings?.reduction?.mode || "umap";
        let prefix = "UMAP";

        if (mode === "tsne") {
          prefix = "t-SNE";
        } else if (mode === "isomap") {
          prefix = "Isomap";
        }

        return {
          x: `${prefix}-1`,
          y: `${prefix}-2`,
        };
      }

      // Draws graph based on current data stored in local storage
      function graph() {
        console.log("trying to grph");
        // Loads current user settings, data, and previous zoom view (called camera).
        // Getting resources from local storage
        let settings = getLocalStorage("settings");
        let fullGraphData = getLocalStorage("data");
        let camera = getLocalStorage("camera");

        // Check to see if annotations are currently on, if they are, apply them at the very end
        // Need to use a try catch block as trying to access myPlot.layout.annotations will fail if they aren't present
        let enablePointLabels = false;
        try {
          const anns = myPlot?.layout?.annotation;
          enablePointLabels = Array.isArray(anns) && anns.some(a => a && a.showarrow === true);
        } catch {
          enablePointLabels = false;
        }

        // This stores the data only for points that are going to be displayed. (points that are < qval max and > q-val min)
        // Creates a filtered list of points that pass the user’s cutoff settings.
        // Example: show only points with qValue between 0.01 and 0.1.
        let displayedGraphData = {};
        dataKeys.forEach((key) => {
          displayedGraphData[key] = [];
        });

        // Get number of points in full data, could have used any key instead of X as they all have the same size
        let numberOfPoints = fullGraphData["X"].length;

        // Loop through full graph data, ignoring anything below cuttoff and adding the rest
        for (let i = 0; i < numberOfPoints; i++) {
          dataKeys.forEach((key) => {
            displayedGraphData[key].push(fullGraphData[key][i]);
          });
        }

        // Create a plotly trace, this contians all data for each point on graph based on displayedGraphData
        // trace = the visual data for Plotly to use (coordinates, sizes, color, etc.)
        let trace = makeTrace(displayedGraphData, settings);
        const axisLabels = getAxisLabels(settings);

        // Define layout properties of graoh
        let layout = {
          title: "Double-click here to name your plot",
          hovermode: "closest",
          dragmode: "select",
          xaxis: {
            title: axisLabels.x,
            zeroline: false, // This makes sure that the x and y axis aren't highlighted at 0
          },
          yaxis: {
            title: axisLabels.y,
            zeroline: false,
          },
          height: Math.max(window.innerHeight - 50, 300), // Set minimum on height and width as plotly stops working below 300 x 300
          width: Math.max(window.innerWidth - 50, 300),
        };

        // Allow annotations, graph title, and colorbar title to be editable.
        // Disable default double click event as it conflicts with custom camera settings.
        // Disable some deafult plotly buttons that aren't helpful in a UMAP context
        let config = {
          scrollZoom: false,
          edits: {
            annotationTail: true,
            annotationText: true,
            titleText: true,
            colorbarTitleText: true,
          },
          doubleClick: false,
          modeBarButtonsToRemove: [
            "toggleSpikelines",
            "hoverClosestCartesian",
            "hoverCompareCartesian",
          ],
        };

        // Custom Camera settings: find zoom level that displays all points (even the ones outside of cutoff) and let that be the max
        // This is done for clarity so when user zooms out, it returns to same zoom level every time.
        // First check if camera settings exist for this data set already, if not, create new settings

        // If the user had a zoomed view earlier, it restores it.
        if (camera) {
          layout.xaxis = camera["xaxis"];
          layout.yaxis = camera["yaxis"];
          layout.xaxis.title = axisLabels.x;
          layout.yaxis.title = axisLabels.y;
          Plotly.newPlot(myPlot, [trace], layout, config);

          // If not, it figures out the best zoom and saves it.
        } else {
          // Create a graph with full data set in order to grab the xaxis and yaxis zoom levels
          Plotly.newPlot(
            myPlot,
            [makeTrace(fullGraphData, settings)],
            layout,
            config
          );

          // Create camera settings with new zoom levels
          camera = {
            xaxis: {
              title: axisLabels.x,
              autorange: false, // Autorange causes some interference with camera so its turned off
              range: myPlot.layout.xaxis.range,
              zeroline: false,
            },
            yaxis: {
              title: axisLabels.y,
              autorange: false,
              range: myPlot.layout.yaxis.range,
              zeroline: false,
            },
          };

          // Save and apply camera settings by drawing graph with correct data
          setLocalStorage("camera", camera);
          layout.xaxis = camera.xaxis;
          layout.yaxis = camera.yaxis;
          Plotly.newPlot(myPlot, [trace], layout, config);
        }
        let currentConfig = { ...config };

        myPlot.on("plotly_relayout", function (event) {
          if ("dragmode" in event) {
            const isPan = event.dragmode === "pan";
            currentConfig.scrollZoom = isPan;

            Plotly.react(myPlot, myPlot.data, myPlot.layout, currentConfig);
          }
        });

        // If there were annotations present before call to graph, apply them again
        if (enablePointLabels) {
          toggleLabels();
        }

        // Now apply cluster labels (after plot exists)
        applyClusterLabelsIfNeeded(displayedGraphData, settings);

        // This saves edits to the annotations that the user makes
        myPlot.on("plotly_relayout", function (event) {
          // Check to see if there are already annotations saved. Format forsaved annotations is key = point number, value = annotation data
          let annotations = getLocalStorage("annotations");
          if (annotations === null) {
            annotations = {};
          }

          // plotly_relayout gets called on several events, window size change, zoom in, and others.
          // Check to see if they key in the current event matches the expected format of annotations[i] where i is annotation number
          let keyRegex = /annotations\[[0-9]+\]/i;
          let isAnnotationEdit = false;
          let annotationNumber = -1;

          // Compare against keys in the event and get annotation number if it is
          for (let key in event) {
            if (keyRegex.test(key)) {
              isAnnotationEdit = true;
              annotationNumber = parseInt(key.slice(12, key.length - 1));
            }
          }

          if (isAnnotationEdit) {
            // inside the isAnnotationEdit block, after you compute annotationNumber:
            const annObj = myPlot.layout.annotations?.[annotationNumber];
            if (annObj && annObj._kind === "cluster") return;

            // also safety:
            if (!myPlot.data?.[0]?.customdata || annotationNumber >= myPlot.data[0].customdata.length) return;

            // Get the point number by going to the list of currently displayed points (myPlot.data[0]), then getting the point number of the current annotation edited (.customdata[annotationNumber][1])
            // Custom data is a 2D array of all currently displayed points that contains the following: [qvalue, pointnumber] for all points.
            let pointNumber = myPlot.data[0].customdata[annotationNumber][1];

            // Set annotation in saved annotations with the key as pointnumber and value as annotation
            annotations[pointNumber] =
              myPlot.layout.annotations[annotationNumber];
            setLocalStorage("annotations", annotations);
          }
        });

        // Handles selecting and unselecting data
        myPlot.on("plotly_click", function (event) {
          selectPoint(event, true);
        });

        // Handles select events with box select and lasso select.
        // Unselect is turned off so users don't mass unselecting points by mistake
        myPlot.on("plotly_selected", function (event) {
          selectPoint(event, false);
        });

        // Custom zoom out function. This handles zooming out and overrides the default double click zoom out
        myPlot.on("plotly_doubleclick", () => {
          camera = getLocalStorage("camera");
          Plotly.relayout(myPlot, {
            xaxis: camera["xaxis"],
            yaxis: camera["yaxis"],
          });
        });
      }

      function updateGraphStyling() {
        try {
          const settings = getLocalStorage("settings");
          const fullGraphData = getLocalStorage("data");

          if (!settings || !fullGraphData || !myPlot || !myPlot.data || !myPlot.data[0]) {
            console.error("Missing required data for graph styling update");
            return;
          }

          // Determine which points are currently displayed using customdata[1] (full index)
          const displayedCustom = myPlot.data[0].customdata || [];
          const displayedIndices = displayedCustom.map((cd) => cd[1]);

          const displayedGraphData = {};
          dataKeys.forEach((key) => {
            displayedGraphData[key] = displayedIndices.map((i) => fullGraphData[key][i]);
          });

          const trace = makeTrace(displayedGraphData, settings);

          const update = {
            "marker.size": [trace.marker.size],
            "marker.opacity": [trace.marker.opacity],
            "marker.line.width": [trace.marker.line.width],
            "marker.line.color": [trace.marker.line.color],
            "marker.color": [trace.marker.color],
            "marker.showscale": [trace.marker.showscale === true],
          };

          if (trace.marker.colorscale) update["marker.colorscale"] = [trace.marker.colorscale];
          if (trace.marker.cmin !== undefined) update["marker.cmin"] = [trace.marker.cmin];
          if (trace.marker.cmax !== undefined) update["marker.cmax"] = [trace.marker.cmax];
          if (trace.marker.colorbar) update["marker.colorbar"] = [trace.marker.colorbar];

          Plotly.restyle(myPlot, update, [0]);
          applyClusterLabelsIfNeeded(displayedGraphData, settings);
        } catch (error) {
          console.error("Error updating graph styling:", error);
        }
      }
      window.updateGraphStyling = updateGraphStyling;

      // Get new graph data from UMAP on backend
      function getUmapData(settings) {
        return new Promise((resolve, reject) => {
          // Load user input file and csrf token
          let fileData = localStorage.getItem("rawFile");
          const csrftoken = getCookie("csrftoken");

          // Fetch data with umap settings and file
          fetch("/read-output/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrftoken,
            },
            body: JSON.stringify({
              file: fileData,
              neighbors: settings["number-of-neighbors"],
              minDistance: settings["minimum-distance"],
              seed: settings["seed"],
            }),
          })
            .then((response) => {
              // If the response is not ok, reject the promise with an error message
              if (!response.ok) {
                return response.json().then((errorData) => {
                  reject(
                    new Error(errorData.error || "Unknown error occurred")
                  );
                });
              }

              // Otherwise, continue
              return response.json();
            })
            .then((data) => {
              // Clear out annotations and camera as these contain new cooridnates for every point and these won't apply
              localStorage.removeItem("camera");
              localStorage.removeItem("annotations");

              // Object to store data from umap, initalize with empty lists
              let dataStorage = {};
              dataKeys.forEach((key) => {
                dataStorage[key] = [];
              });

              for (let i = 0; i < data.length; i++) {
                // If statement needed for color and pointnumber as these were not given by UMAP, so data[color] and data[pointNumber] don't exist
                dataKeys.forEach((key) => {
                  if (key === "color") {
                    dataStorage["color"].push("white"); // Default outline color is white
                  } else if (key === "pointNumber") {
                    dataStorage["pointNumber"].push(i); // Pointnumber is the index of point in all data
                  } else {
                    dataStorage[key].push(data[i][key]);
                  }
                });
              }

              // Store the entire data object in localStorage as JSON string
              setLocalStorage("data", dataStorage);
              resolve();
            })
            .catch((error) => {
              reject(error); // Catches any error that occured when reading data
            });
        });
      }

      function getGeneData(settings) {
        return new Promise((resolve, reject) => {
          const rankedGenes = localStorage.getItem("rankedGenes")
          const selectedGeneSets = window.parent?.GSP?.selectedGeneSets || [];
          const minMembers = localStorage.getItem("minMembers")
          const pVal = localStorage.getItem("p-value")
          const fdr = localStorage.getItem("fdr")
          const species = localStorage.getItem("species")
          const distanceType = settings["distance_type"];
          const reset = localStorage.getItem("reset");
          let distancesV = false;

          if (localStorage.getItem("distances-M")) {
            distancesV = JSON.parse(localStorage.getItem("distances-M"));
          }
          if (reset) {
            if (JSON.parse(reset)) {
              distancesV = false;
              m = [];
              relevantMembers = [];
              setLocalStorage("reset", false);
              setLocalStorage("selected", []);
            }
          }
          localStorage.setItem("distances-M", JSON.stringify(distancesV));

          let distancesM = {
            'use': distancesV,
            'm': m
          }


          // Get CSRF token as before
          const csrftoken = getCookie("csrftoken");

          const customGeneSets = window.parent?.GSP?.customGeneSetsData || window.parent?.GSP?.customGeneSets?.data || window.parent?.GSP?.customGeneSets || null;
          if (customGeneSets) {
            console.log("Received custom gene sets from parent:", customGeneSets)
          }

          // POST gene data to /gene-input/ endpoint
          fetch("/gene-input2/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrftoken,
            },
            body: JSON.stringify({
              ranked_genes: rankedGenes,
              selected_genes_sets: selectedGeneSets,
              minMembers: minMembers,
              p_thr: pVal,
              fdr_thr: fdr,
              species: species,
              custom_data: customGeneSets,
              settings: settings,
              distance_type: distanceType,
              distancesM: distancesM,
              relevant_members: []
            }),
          })
            .then((response) => {
              if (!response.ok) {
                return response.json().then((errorData) => {
                  reject(new Error(errorData.error || "Unknown error occurred"));
                });
              }
              return response.json();
            })
            .then((data) => {
              // Clear camera and annotations as data changed
              localStorage.removeItem("camera");
              localStorage.removeItem("annotations");

              const pvalDisplay = data.p_value;
              const fdrDisplay = data.fdr_value;
              const umapData = data.umap;
              const distancesRet = data.distancesM;
              let distancesV = true;
              m = distancesRet;
              relevantMembers = [];
              localStorage.setItem("distances-M", JSON.stringify(distancesV));

              window.parent.document.getElementById("pvalue-input").value = parseFloat(pvalDisplay).toFixed(4);
              window.parent.document.getElementById("fdr-input").value = parseFloat(fdrDisplay).toFixed(4);
              window.parent.localStorage.setItem("computed-p-value", parseFloat(pvalDisplay).toFixed(4));
              window.parent.localStorage.setItem("computed-fdr", parseFloat(fdrDisplay).toFixed(4));

              // Convert returned data into the localStorage.data structure
              let dataStorage = {};
              dataKeys.forEach((key) => {
                dataStorage[key] = [];
              });

              for (let i = 0; i < umapData.length; i++) {
                dataKeys.forEach((key) => {
                  if (key === "color") {
                    dataStorage["color"].push("white");
                  } else if (key === "pointNumber") {
                    dataStorage["pointNumber"].push(i);
                  } else {
                    dataStorage[key].push(umapData[i][key]);
                  }
                });
              }

              // Extract qValue array
              const qVals = umapData.map(point => point.qValue);

              // Get min/max qValue
              const minQ = Math.min(...qVals);
              const maxQ = Math.max(...qVals);

              // Update settings
              let currentSettings = getLocalStorage("settings") || {};
              currentSettings["q-value-minimum"] = minQ;
              currentSettings["q-value-maximum"] = maxQ;
              setLocalStorage("settings", currentSettings);

              // After q-value min/max is updated:
              window.parent.update_settings?.displayValues(currentSettings);

              // Save data
              setLocalStorage("data", dataStorage);
              resolve();
              window.parent.localStorage.setItem("previous_settings", JSON.stringify(settings));
            })
            .catch((error) => {
              reject(error);
            });
        });
      }

      function getGeneInputData(settings) {

          console.log("Seen")
          const sigGenes = localStorage.getItem("sigGenes")

          const minMembers = localStorage.getItem("minMembers")
          const pVal = localStorage.getItem("p-value")

              window.parent.document.getElementById("fdr-input").value = parseFloat(fdrDisplay).toFixed(4);
              window.parent.localStorage.setItem("computed-p-value", parseFloat(pvalDisplay).toFixed(4));
              window.parent.localStorage.setItem("computed-fdr", parseFloat(fdrDisplay).toFixed(4));

              // Convert returned data into the localStorage.data structure
              let dataStorage = {};
              dataKeys.forEach((key) => {
                dataStorage[key] = [];
              });

              for (let i = 0; i < umapData.length; i++) {
                dataKeys.forEach((key) => {
                  if (key === "color") {
                    dataStorage["color"].push("white");
                  } else if (key === "pointNumber") {
                    dataStorage["pointNumber"].push(i);
                  } else {
                    dataStorage[key].push(umapData[i][key]);
                  }
                });
              }

              // Extract qValue array
              const qVals = umapData.map(point => point.qValue);

              // Get min/max qValue
              const minQ = Math.min(...qVals);
              const maxQ = Math.max(...qVals);

              // Update settings
              let currentSettings = getLocalStorage("settings") || {};
              currentSettings["q-value-minimum"] = minQ;
              currentSettings["q-value-maximum"] = maxQ;
              setLocalStorage("settings", currentSettings);

              // After q-value min/max is updated:
              window.parent.update_settings?.displayValues(currentSettings);

              // Save data
              setLocalStorage("data", dataStorage);
              resolve();
              window.parent.localStorage.setItem("previous_settings", JSON.stringify(settings));

      }

      // Get umap data once more and draw graph. Selected are cleared as new UMAP data doesn't carry over selected points since they are in new positions
      async function applyUmapChange(settings) {
        let singleList = false; // Default value if not found
        const storedSingleList = localStorage.getItem("single-list");
        if (storedSingleList !== null) {
          singleList = JSON.parse(storedSingleList); // Parse "true" to true, "false" to false
        }
        showSpinner();

        if (singleList == true) {
          await getGeneData(settings);
        } else {
          await getGeneInputData(settings);
        }

        // Clear selected + table after new data loaded
        localStorage.setItem("selected", JSON.stringify([]));

        hideSpinner();
        graph();
        clearSelected();
      }

      // Resize window on browser size change
      window.onresize = function () {
        let update = {
          height: Math.max(window.innerHeight - 50, 300),
          width: Math.max(window.innerWidth - 50, 300),
        };
        Plotly.relayout(myPlot, update);
      };

      // --- Cluster coloring helpers ---
      const CLUSTER_OPACITY = 0.55; // Slightly transparent so overlapped points are still visible
      const NOISE_COLOR = "#CDCDCD";

      function getClusterPalette() {
        return [
          "#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd",
          "#8c564b", "#e377c2", "#bcbd22", "#17becf",
          "#393b79", "#637939", "#8c6d31", "#843c39", "#7b4173",
          "#3182bd", "#31a354", "#756bb1", "#e6550d",
        ];
      }

      function buildClusterColorMap(clusterIDs) {
        const palette = getClusterPalette();

        // Keep only real clusters (exclude noise: -1 / null / undefined)
        const clusters = Array.from(new Set(clusterIDs))
          .filter((c) => c !== null && c !== undefined && c !== -1 && c !== "-1")
          .map((c) => (typeof c === "string" ? parseInt(c, 10) : c))
          .filter((c) => !Number.isNaN(c))
          .sort((a, b) => a - b);

        const map = {};
        clusters.forEach((cid, idx) => {
          map[cid] = palette[idx % palette.length];
        });
        return map;
      }

      function getClusterFillColors(clusterIDs) {
        const map = buildClusterColorMap(clusterIDs);
        return clusterIDs.map((c) => {
          if (c === null || c === undefined || c === -1 || c === "-1") return NOISE_COLOR;
          const cid = typeof c === "string" ? parseInt(c, 10) : c;
          return map[cid] ?? NOISE_COLOR;
        });
      }

      // Generates the data for each point based on settings
      function makeTrace(data, settings) {
        // Sizes & outline logic stays the same
        const size = getSize(data["setSize"], settings);
        const outlineWidth = data["color"].map((color) => (color === "white" ? 1 : 2));

        const clusterMode = !!settings["cluster-mode"];

        // Default (non-cluster) mode uses -log10(qValue) continuous scale
        const qVals = data["qValue"];
        const logPvals = qVals.map((p) => -Math.log10(Math.max(p, 1e-10)));
        const minLogP = Math.min(...logPvals);
        const maxLogP = Math.max(...logPvals);

        const markerBase = {
          size: size,
          line: {
            width: outlineWidth,
            color: data["color"], // border color (selection logic uses this)
          },
        };

        let marker = null;

        if (clusterMode) {
          const fillColors = getClusterFillColors(data["clusterID"] || []);
          marker = {
            ...markerBase,
            color: fillColors,      // discrete colors per cluster
            opacity: CLUSTER_OPACITY,
            showscale: false,       // hide continuous colorbar
          };
        } else {
          marker = {
            ...markerBase,
            color: logPvals,
            cmin: minLogP,
            cmax: maxLogP,
            colorscale: [
              [0.0, settings["insignificant-color"]],
              [1.0, settings["significant-color"]],
            ],
            colorbar: {
              title: { text: "Double Click To Edit", side: "right" },
            },
            opacity: 1.0,
            showscale: true,
          };
        }

        const trace = {
          x: data["X"],
          y: data["Y"],
          mode: "markers",
          type: "scatter",
          text: data["setName"],
          customdata: data["qValue"].map((qValue, index) => [qValue, data["pointNumber"][index]]),
          hovertemplate: "Name: %{text}<br>P-Value: %{customdata[0]}<extra></extra>",
          marker: marker,
        };

        return trace;
      }

      function buildClusterLabelAnnotations(displayedData, settings) {
        const clusterIDs = displayedData["clusterID"] || [];
        const labels = displayedData["clusterLabel"] || []; // already available from backend
        const xs = displayedData["X"] || [];
        const ys = displayedData["Y"] || [];

        // map clusterID -> {sumX, sumY, n, label}
        const agg = {};
        for (let i = 0; i < clusterIDs.length; i++) {
          const cid = clusterIDs[i];
          if (cid === null || cid === undefined || cid === -1 || cid === "-1") continue;

          const c = typeof cid === "string" ? parseInt(cid, 10) : cid;
          if (Number.isNaN(c)) continue;

          if (!agg[c]) agg[c] = { sumX: 0, sumY: 0, n: 0, label: labels[i] ?? `Cluster ${c}` };
          agg[c].sumX += Number(xs[i]);
          agg[c].sumY += Number(ys[i]);
          agg[c].n += 1;
        }

        const clusterIdsSorted = Object.keys(agg).map(Number).sort((a, b) => a - b);
        const colorMap = buildClusterColorMap(clusterIdsSorted); // already have :contentReference[oaicite:2]{index=2}

        return clusterIdsSorted.map((cid) => {
          const c = agg[cid];
          const x = c.sumX / c.n;
          const y = c.sumY / c.n;
          return {
            _kind: "cluster",
            x, y,
            text: c.label || `Cluster ${cid}`,
            showarrow: false,
            font: { size: 14, color: "#111", family: "Arial Black, Arial, sans-serif" },
          };
        });
      }

      function applyClusterLabelsIfNeeded(displayedData, settings) {
        const clusterMode = !!settings["cluster-mode"];
        const existing = (myPlot.layout && Array.isArray(myPlot.layout.annotations))
          ? myPlot.layout.annotations
          : [];

        // keep point labels (or anything not cluster)
        const keep = existing.filter(a => a?._kind !== "cluster");

        if (!clusterMode) {
          Plotly.relayout(myPlot, { annotations: keep });
          return;
        }

        const clusterAnn = buildClusterLabelAnnotations(displayedData, settings)
          .map(a => ({ ...a, _kind: "cluster" }));

        Plotly.relayout(myPlot, { annotations: keep.concat(clusterAnn) });
      }

      // Point selection code. Event contains refrence to the point selected along with marker data for point. Allowunselect is a bool
      function selectPoint(event, allowUnselect) {
        // Get needed data from local storage
        let selected = getLocalStorage("selected");
        let fullGraphData = getLocalStorage("data");
        let settings = getLocalStorage("settings");
        if (selected === null) {
          selected = [];
        }

        // If no event actually passed, or the length of points is 0 return.
        if (event === undefined || event.points.length === 0) {
          return;
        }

        // Refrence to first point made to get data that is universal to all selected points
        let firstPoint = event.points[0];
        let curveNumber = firstPoint.curveNumber; // Refrence to the ID of the points on the graph

        // The following are arrays of information of each displayed point needed for plotly.restyle
        let borderColor = firstPoint.data.marker.line.color.slice();
        const pVals = firstPoint.data.customdata.map(d => d[0]);
        const logColors = pVals.map(p => -Math.log10(Math.max(p, 1e-10)));
        const minLogP = Math.min(...logColors);
        const maxLogP = Math.max(...logColors);
        let outlineWidths = firstPoint.data.marker.line.width.slice();
        let sizes = firstPoint.data.marker.size.slice();

        let unselect = false; // Assume point isn't being unselected

        // Loop through each point selected
        for (let i = 0; i < event.points.length; i++) {
          let localPointNumber = event.points[i].pointNumber; // This is the index of the point in the borderColor, pointColors, outlineWidths, and sizes array. Contains only DISPLAYED points
          let pointNumber = event.points[i].customdata[1]; // This s the index of the point in the data object of ALL points

          /*
          In the following if statements two main things are edited. fullGraphData and the above arrays.
          The above arrays are used to call plotly.restyle, which only needs data on the currently displayed points.
          Plotly.restyle is used instead of calling graph(), because this won't zoom out the camera whenever the user selects something.
          However full graph data must be updated so if the user displays more points, the correct point is still selected.
          Full graph data cannot be used for plotly.restyle as it contians data of points that may not be displayed.
          */

          // Point is selected if its color is currently the color of a selected point
          let isPointSelected =
            fullGraphData["color"][pointNumber] ===
            settings["selected-color"] && allowUnselect;

          if (isPointSelected) {
            fullGraphData["color"][pointNumber] = "white"; // Unselect point in full graph data and borderColor and reset outline width
            borderColor[localPointNumber] = "white";
            outlineWidths[localPointNumber] = 1;
            unselect = true; // Mark point for unselection
          } else {
            borderColor[localPointNumber] = settings["selected-color"]; // Select point in full graph data and border color, increase outline
            fullGraphData["color"][pointNumber] = settings["selected-color"];
            outlineWidths[localPointNumber] = 2;
          }

          // Generate object to be put in local storage
          let selectedPoint = {
            pointNumber: pointNumber,
            qValue: fullGraphData["qValue"][pointNumber],
            molecules: fullGraphData["molecules"][pointNumber],
            setName: fullGraphData["setName"][pointNumber],
            sigGenes: (localStorage.getItem("sigGenes") || "").split(/[\s,]+/).filter(Boolean)
          };

          // If point needs to be unselected, and unselected is permitted
          if (unselect && allowUnselect) {
            // Find point and remove it from selected list
            for (let i = 0; i < selected.length; i++) {
              if (selected[i]["pointNumber"] === pointNumber) {
                selected.splice(i, 1);
              }
            }
            // Otherwise, if point isn't already selected, add it to selected list
          } else if (
            !selected.some((obj) => obj["pointNumber"] === pointNumber)
          ) {
            selected.push(selectedPoint);
          }
        }

        const clusterMode = !!settings["cluster-mode"];

        // Create variable used in plotly restyle to apply selected point colors
        // All marker settings need to be specified here or else plotly resets them to default, which is why unchanged settings are redeclared like sizes and colorscale
        let update = null;

        if (clusterMode) {
          // Keep current fill color (discrete cluster colors)
          const fillColors = firstPoint.data.marker.color.slice();

          update = {
            marker: {
              color: fillColors,
              opacity: CLUSTER_OPACITY,
              showscale: false,
              size: sizes,
              line: {
                width: outlineWidths,
                color: borderColor,
              },
            },
          };
        } else {
          // normal mode
          update = {
            marker: {
              color: logColors,
              colorscale: [
                [0.0, settings["insignificant-color"]],
                [1.0, settings["significant-color"]],
              ],
              colorbar: firstPoint.data.marker.colorbar,
              cmin: minLogP,
              cmax: maxLogP,
              size: sizes,
              opacity: 1.0,
              line: {
                width: outlineWidths,
                color: borderColor,
              },
            },
          };
        }

        // Save selected and data points in local storage
        setLocalStorage("data", fullGraphData);
        console.log("bout to set the selected dt")
        setLocalStorage("selected", selected);
        // Restyle graph
        Plotly.restyle(myPlot, update, [curveNumber]);
      }

      // Clear out selected items
      function clearSelected() {
        // Get data and selected points
        let fullGraphData = getLocalStorage("data");
        let selectedPoints = getLocalStorage("selected");
        if (selectedPoints === null) {
          selectedPoints = [];
        }

        // Reset colors of selected points
        for (let i = 0; i < selectedPoints.length; i++) {
          pointNumber = selectedPoints[i]["pointNumber"];
          fullGraphData["color"][pointNumber] = "white";
        }

        // Set data back in local storage
        localStorage.setItem("selected", "[]");
        setLocalStorage("data", fullGraphData);

        // Unlike in the select function, here graph is called which does reset camera zoom out.
        // This is done because we dont have the "event" refrence containing marker data for selected point which is needed for calling plotly.restyle
        graph();
      }

      // Toggles the label annotations for each point
      function toggleLabels() {
        // Get needed data from local storage
        let fullGraphData = getLocalStorage("data");
        let savedAnnotations = getLocalStorage("annotations");
        if (savedAnnotations === null) savedAnnotations = {};

        // Existing annotations on plot
        const existing = (myPlot.layout && Array.isArray(myPlot.layout.annotations))
          ? myPlot.layout.annotations
          : [];

        // Keep cluster labels always
        const clusterKeep = existing.filter(a => a && a._kind === "cluster");
        const pointExisting = existing.filter(a => a && a._kind === "point");

        // If point labels are currently ON -> turn OFF only point labels, keep cluster labels
        if (pointExisting.length !== 0) {
          Plotly.relayout(myPlot, { annotations: clusterKeep });
          return;
        }

        // This is the data of points currently displayed on graph.
        let data = myPlot.data[0];

        // Build point annotations
        let annotations = [];

        // ... keep existing overlap logic, but:
        // 1) when pushing saved annotations, tag them as point
        // 2) when creating new annotation, tag it as point

        for (let i = 0; i < data["x"].length; i++) {
          let pointNumber = data["customdata"][i][1];

          if (savedAnnotations[pointNumber] !== undefined) {
            annotations.push({ ...savedAnnotations[pointNumber], _kind: "point" });
            continue;
          }

          let annotation = {
            _kind: "point",
            x: data["x"][i],
            y: data["y"][i],
            text: fullGraphData["setName"][pointNumber],
            showarrow: true,
            arrowhead: 0,
            ax: data["x"][i],
            ay: data["y"][i] + (0.5),
            axref: "x",
            ayref: "y",
            visible: true,
            arrowwidth: 0.7,
            font: { size: 12 },
          };

          // ... keep overlap-prevention code that updates ax/ay ...

          annotations.push(annotation);
        }

        // Turn ON point labels, while keeping cluster labels
        Plotly.relayout(myPlot, { annotations: clusterKeep.concat(annotations) });
      }

      // Determines if an annotation is overlapping with another annotation or point
      function overlapping(annotation, annotations, xRange, yRange) {
        // Set the collision ranges for x and y axis.
        // This means that if a point is within 0.3 on the y axis and 2 on the x axis, the annotation is considered overlapping
        //let yRange = 0.3;
        //let xRange = 1.5;

        // Initilaize values to false
        // AY/AX variables are checking if there is overlap with another annotation
        // X/Y variables are checking if there is overlap with another point
        let overlapOnAY = false;
        let overlapOnAX = false;
        let overlapOnX = false;
        let overlapOnY = false;

        // Loop through all annotations to check for overlaps.
        for (let i = 0; i < annotations.length; i++) {
          overlapOnAY = checkOverlapOnAxis(
            annotation.ay,
            annotations[i].ay,
            yRange
          );
          overlapOnAX = checkOverlapOnAxis(
            annotation.ax,
            annotations[i].ax,
            xRange
          );
          overlapOnY = checkOverlapOnAxis(
            annotation.ay,
            annotations[i].y,
            yRange
          );
          overlapOnX = checkOverlapOnAxis(
            annotation.ax,
            annotations[i].x,
            xRange
          );

          // If overlap with annotation OR point, return
          if ((overlapOnAY && overlapOnAX) || (overlapOnX && overlapOnY)) {
            return true;
          }
        }
        return false;
      }

      // If the first point is in the range of the second point, there is overlap on this axis
      function checkOverlapOnAxis(x1, x2, range) {
        return x1 > x2 - range && x1 < x2 + range;
      }

      // Get size of function based on user settings
      function getSize(sizes, settings) {
        // If setting is a simple fixed size which is one number, return single number
        if (settings["fixed-size"]) {
          return settings["fixed-size-input"];
        }

        // Sizes contains the number of enriched genes in each set.
        // This number is treated as the area of the point.
        // Apply user scaling, then convert into a diamater as the "size" varaible with plotly is the diamater in pixels

        let adjustedSizes = [];
        let scalar = parseFloat(settings["dynamic-size-scalar"]);

        // Loop through all of the sizes, apply scalar, and convert area into diamater
        for (let i = 0; i < sizes.length; i++) {
          let adjustedArea = sizes[i] * scalar;
          let diamater = 2 * Math.sqrt(adjustedArea / Math.PI);

          adjustedSizes.push(diamater);
        }

        return adjustedSizes;
      }

      function getLocalStorage(key) {
        return JSON.parse(localStorage.getItem(key));
      }

      // Add this function to the iframe's window
      function checkSettingsNeedApply() {
        try {
          const currentSettings = getLocalStorage("settings");
          if (!currentSettings) return false;

          const parentSettings = window.parent.update_settings?.collectCurrentSettings();
          if (!parentSettings) return false;

          return window.parent.update_settings?.isEmbeddingChanged?.(parentSettings, currentSettings) || false;
        } catch (e) {
          console.error("Error checking settings:", e);
          return false;
        }
      }

      // Make it accessible to parent window
      window.checkSettingsNeedApply = checkSettingsNeedApply;

      function setLocalStorage(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function showSpinner() {
        spinnerOverlay.style.display = "flex";
      }

      function hideSpinner() {
        spinnerOverlay.style.display = "none";
      }

      // Function to get CSRF token in post request for UMAP data
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
          const cookies = document.cookie.split(";");
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + "=") {
              cookieValue = decodeURIComponent(
                cookie.substring(name.length + 1)
              );
              break;
            }
          }
        }
        return cookieValue;
      }

      function downloadAnalysisResults() {
        const fullGraphData = getLocalStorage("data");
        if (!fullGraphData) {
          alert("No analysis data available.");
          return;
        }

        const pad = (text, width) => String(text).padEnd(width, " ");

        let header = pad("Gene Set Name", 25) + "\t" +
          pad("P-Value", 15) + "\t" +
          pad("Q-Value", 15) + "\t" +
          pad("Set Size", 15) + "\t" +
          "Matched Genes\n";

        let content = "";

        const rows = [];
        const total = fullGraphData["setName"].length;

        for (let i = 0; i < total; i++) {
          rows.push({
            name: fullGraphData["setName"][i] ?? "N/A",
            p: fullGraphData["pValue"]?.[i] ?? Infinity,
            q: fullGraphData["qValue"]?.[i] ?? Infinity,
            size: fullGraphData["setSize"]?.[i] ?? "N/A",
            genes: fullGraphData["molecules"]?.[i]?.split(" ").join(",") ?? ""
          });
        }

        // Sort ascending by p-value
        rows.sort((a, b) => a.p - b.p);

        for (const row of rows) {
          content += pad(row.name, 25) + "\t" +
            pad(row.p.toExponential(2), 15) + "\t" +
            pad(row.q.toExponential(2), 15) + "\t" +
            pad(row.size, 15) + "\t" +
            row.genes + "\n"; // no padding for genes, allow overflow
        }

        const blob = new Blob([header + content], { type: "text/tab-separated-values" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "analysis_results.tsv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }
    </script>
    <div id="download-button-wrapper" style="display: none;">
      <button onclick="downloadAnalysisResults()">Download Result</button>
    </div>
  </div>
